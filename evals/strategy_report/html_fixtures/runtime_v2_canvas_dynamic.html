<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Runtime V2 Dynamic Canvas Fixture</title>
  <style>
    body { margin:0; font-family:Arial, "Microsoft YaHei", sans-serif; color:#172033; background:#eef3f7; }
    main { max-width:1040px; margin:0 auto; padding:40px 24px; }
    section { background:#fff; border:1px solid #d8dee8; border-radius:8px; margin:20px 0; padding:24px; }
    canvas { width:920px; height:420px; max-width:100%; border:1px solid #cbd5e1; background:#fff; }
    .source { font-size:12px; color:#667085; }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>动态 Canvas 图表测试</h1>
      <p>这个 fixture 用脚本绘制 canvas 图表，静态 BeautifulSoup 只能看到空 canvas；Runtime Adapter V2 应该截到渲染后的图。</p>
    </section>
    <section>
      <h2>图 3：智能电网资本开支情景测算</h2>
      <figure class="chart" data-chart="canvas-scenario">
        <canvas id="scenario" width="920" height="420"></canvas>
        <figcaption>基准、乐观、悲观三种情景下，2024-2028 年智能电网资本开支指数。</figcaption>
        <p class="source">资料来源：模拟测算。</p>
      </figure>
    </section>
  </main>
  <script>
    const canvas = document.getElementById('scenario');
    const ctx = canvas.getContext('2d');
    ctx.font = '18px Microsoft YaHei, Arial';
    ctx.fillStyle = '#172033';
    ctx.fillText('智能电网资本开支指数（2024=100）', 28, 34);
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const y = 80 + i * 60;
      ctx.beginPath(); ctx.moveTo(70, y); ctx.lineTo(860, y); ctx.stroke();
    }
    const years = ['2024','2025','2026','2027','2028'];
    years.forEach((year, i) => ctx.fillText(year, 90 + i * 180, 382));
    function line(values, color, label, yLabel) {
      ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.beginPath();
      values.forEach((v, i) => {
        const x = 110 + i * 180;
        const y = 340 - (v - 80) * 3;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.fillStyle = color; ctx.fillText(label, 720, yLabel);
    }
    line([100,112,128,148,165], '#155eef', '乐观', 92);
    line([100,108,119,132,146], '#18805a', '基准', 122);
    line([100,102,108,113,120], '#b7781f', '悲观', 152);
  </script>
</body>
</html>
