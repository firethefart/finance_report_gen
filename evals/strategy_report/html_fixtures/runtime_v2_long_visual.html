<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Runtime V2 Long Visual Fixture</title>
  <style>
    body { margin:0; font-family: Arial, "Microsoft YaHei", sans-serif; background:#f7fafc; color:#172033; }
    main { max-width:980px; margin:0 auto; padding:32px 24px; }
    section { background:white; margin:24px 0; padding:24px; border:1px solid #d8dee8; border-radius:8px; }
    .spacer { height:760px; background:linear-gradient(#e8f1ff,#fff); display:flex; align-items:center; justify-content:center; color:#667085; }
    .long-visual { border:2px solid #155eef; border-radius:10px; padding:18px; background:#f8fbff; }
    .row { display:grid; grid-template-columns:160px 1fr 80px; gap:12px; align-items:center; margin:10px 0; }
    .track { height:18px; background:#e2e8f0; border-radius:999px; overflow:hidden; }
    .fill { height:100%; background:#18805a; }
    .source { font-size:12px; color:#667085; margin-top:12px; }
  </style>
</head>
<body>
<main>
  <section>
    <h1>长图表分页鲁棒性测试</h1>
    <p>这个 fixture 专门制造一个高度超过单个 viewport 的长图表，用来验证 adapter 是否按 DOM 对象完整截图，而不是按固定页面高度切开。</p>
  </section>
  <div class="spacer">前置正文区域，用于制造滚动距离。</div>
  <section>
    <h2>图 2：30 个细分环节的投资吸引力评分</h2>
    <figure class="long-visual chart" data-chart="long-ranking">
      <figcaption>长排名图：如果采用固定页高切片，这张图很容易被切到两页。</figcaption>
      <div id="longRows"></div>
      <p class="source">资料来源：模拟数据、策略研究框架。</p>
    </figure>
  </section>
  <section>
    <h2>后续讨论</h2>
    <p>长图之后还有正文。评估时应保留长图完整截图，并提供包含图表中心位置的上下文截图。</p>
  </section>
</main>
<script>
  const rows = document.getElementById('longRows');
  const names = ['储能PCS','电网自动化','智能巡检','充换电运营','配网传感','功率半导体','新能源并网','虚拟电厂','电力交易','工控安全'];
  for (let i = 0; i < 30; i++) {
    const score = 96 - i * 2;
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `<b>${names[i % names.length]} ${i + 1}</b><div class="track"><div class="fill" style="width:${score}%"></div></div><span>${score}</span>`;
    rows.appendChild(div);
  }
</script>
</body>
</html>
